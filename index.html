<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabula Lusoria - Roman Empire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tabula Lusoria</h1>
    <p class="subtitle">Ancient Game of the Legions</p>

    <div id="menu-screen">
        <div class="menu-section">
            <h2>Opponent</h2>
            <div class="toggle-group">
                <button class="toggle-btn active" id="btn-pvp" onclick="setMode('pvp')">Two Players</button>
                <button class="toggle-btn" id="btn-ai" onclick="setMode('ai')">Play vs AI</button>
            </div>
        </div>

        <div id="name-input-section">
            <div class="name-input-group">
                <label for="player1-name-input">First Player's Name</label>
                <input type="text" id="player1-name-input" class="name-input" placeholder="Enter name..." maxlength="12" oninput="validateStart()">
            </div>
            <div class="name-input-group" id="player2-name-group">
                <label for="player2-name-input">Second Player's Name</label>
                <input type="text" id="player2-name-input" class="name-input" placeholder="Enter name..." maxlength="12" oninput="validateStart()">
            </div>
        </div>

        <button class="start-btn" id="start-game-btn" onclick="startGame()" disabled>Enter the Arena</button>
    </div>

    <div id="game-screen">
        <div class="game-layout">
            
            <div class="player-area">
                <div class="player-panel active" id="panel-player1">
                    <div class="player-role-label" id="role-label-1">You</div>
                    <div class="avatar white-avatar"></div>
                    <div class="player-name" id="player1-name-display">White</div>
                    <div class="score-box">Victories: <br><span class="score-number" id="score1">0</span></div>
                </div>
                <div class="pieces-pool" id="pool1">
                    <div class="pool-piece white"></div><div class="pool-piece white"></div><div class="pool-piece white"></div>
                </div>
            </div>

            <div class="center-column">
                <div id="status">Placement Phase: Your Turn</div>
                <div class="board-container">
                    <div id="board">
                        <svg class="svg-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <circle cx="50" cy="50" r="40" />
                            <line x1="50" y1="10" x2="50" y2="90" /><line x1="10" y1="50" x2="90" y2="50" />
                            <line x1="21.72" y1="21.72" x2="78.28" y2="78.28" /><line x1="21.72" y1="78.28" x2="78.28" y2="21.72" />
                        </svg>
                        </div>
                </div>
                <div class="controls">
                    <button class="action-btn" onclick="goToMenu()">Back to Menu</button>
                    <button class="action-btn primary" onclick="resetBoard()" id="resetBtn">Restart Round</button>
                </div>
            </div>

            <div class="player-area">
                <div class="player-panel" id="panel-player2">
                    <div class="player-role-label" id="role-label-2">AI</div>
                    <div class="avatar black-avatar"></div>
                    <div class="player-name" id="player2-name-display">Black</div>
                    <div class="score-box">Victories: <br><span class="score-number" id="score2">0</span></div>
                </div>
                <div class="pieces-pool" id="pool2">
                    <div class="pool-piece black"></div><div class="pool-piece black"></div><div class="pool-piece black"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
