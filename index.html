<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabula Lusoria - Roman Empire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tabula Lusoria</h1>
    <p class="subtitle" id="menu-subtitle">A Board Game of Ancient Rome</p>
    <p class="subtitle" id="status"></p>

    <!-- ── Menu screen ────────────────────────────────────────────────── -->
    <div id="menu-screen" class="screen active">
        <div class="game-layout">

            <div class="player-panel" id="p1-selector-box">
                <span class="player-role-label">Player 1</span>
                <img src="" class="game-avatar" id="p1-menu-portrait" alt="Player 1">
                <h3 class="champion-name" id="p1-menu-name">Select Champion</h3>
                <p class="champion-flavor" id="p1-menu-flavor"></p>
                <div class="toggle-group menu-toggle">
                    <button class="toggle-btn active" data-player="1" data-type="human">Human</button>
                    <button class="toggle-btn"        data-player="1" data-type="ai">AI</button>
                </div>
            </div>

            <div class="roster-container">
                <h2 class="menu-title">Choose Your Champion</h2>
                <div class="roster-grid" id="roster-grid"></div>
            </div>

            <div class="player-panel" id="p2-selector-box">
                <span class="player-role-label">Player 2</span>
                <img src="" class="game-avatar mirror-img" id="p2-menu-portrait" alt="Player 2">
                <h3 class="champion-name" id="p2-menu-name">Select Champion</h3>
                <p class="champion-flavor" id="p2-menu-flavor"></p>
                <div class="toggle-group menu-toggle">
                    <button class="toggle-btn" data-player="2" data-type="human">Human</button>
                    <button class="toggle-btn active" data-player="2" data-type="ai">AI</button>
                </div>
            </div>

            <div class="controls">
                <button class="action-btn" id="start-game-btn" disabled>Enter the Arena</button>
            </div>

        </div>
    </div>

    <!-- ── Game screen ────────────────────────────────────────────────── -->
    <div id="game-screen" class="screen">
        <div class="game-layout">

            <!-- Row 1 -->
            <div class="player-panel active" id="panel-player1">
                <div class="player-role-label" id="role-label-1">Human</div>
                <img src="" class="game-avatar p1-avatar" id="game-p1-avatar" alt="P1">
                <div class="player-name" id="player1-name-display">P1 Name</div>
                <div class="score-box">Victories:<br><span class="score-number" id="score1">0</span></div>
                <div class="pieces-pool" id="pool1">
                    <div class="pool-piece white"></div>
                    <div class="pool-piece white"></div>
                    <div class="pool-piece white"></div>
                </div>
            </div>

            <div class="board-container">
                <div id="board"></div>
            </div>

            <div class="player-panel" id="panel-player2">
                <div class="player-role-label" id="role-label-2">AI</div>
                <img src="" class="game-avatar p2-avatar mirror-img" id="game-p2-avatar" alt="P2">
                <div class="player-name" id="player2-name-display">P2 Name</div>
                <div class="score-box">Victories:<br><span class="score-number" id="score2">0</span></div>
                <div class="pieces-pool" id="pool2">
                    <div class="pool-piece black"></div>
                    <div class="pool-piece black"></div>
                    <div class="pool-piece black"></div>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="controls">
                <button class="action-btn" id="btn-menu">Back to Menu</button>
                <button class="action-btn primary" id="btn-restart">Restart Round</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
